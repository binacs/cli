name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ldflags="-X github.com/binacs/cli/version.GitCommit=${GITHUB_SHA}"
          go build -ldflags "$ldflags" -o dist/cli ./cmd/cli
          go build -ldflags "$ldflags" -o dist/clid ./cmd/clid
          tar -C dist -czf "cli_${GOOS}_${GOARCH}.tar.gz" cli clid

      - uses: actions/upload-artifact@v4
        with:
          name: cli_${{ matrix.goos }}_${{ matrix.goarch }}
          path: cli_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
